<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SourceFlow — Requests</title>
  <link rel="stylesheet" href="./app.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">SourceFlow</div>
      <nav class="topnav" aria-label="Application navigation">
        <a href="/app/index.html">Dashboard</a>
        <a href="/app/requests.html" aria-current="page">Requests</a>
        <a href="/app/admin.html">Admin</a>
      </nav>
    </div>
  </header>

  <main class="app-shell">
    <section class="hero-panel" aria-labelledby="requests-heading">
      <div>
        <p class="eyebrow">Customer View</p>
        <h1 id="requests-heading">Submit Request</h1>
        <p class="intro">
          Create a new personal shopping request and review all submitted requests.
        </p>
      </div>
    </section>

    <section class="dashboard-grid" aria-label="Request form and list">
      <article class="panel">
        <div class="panel-header">
          <h2>Create a New Request</h2>
        </div>

        <form id="requestForm" novalidate>
          <div class="form-grid">
            <div>
              <label for="customer_name">Customer name</label>
              <input id="customer_name" required />
            </div>

            <div>
              <label for="customer_email">Email</label>
              <input id="customer_email" type="email" />
            </div>

            <div>
              <label for="item_name">Item name</label>
              <input id="item_name" required />
            </div>

            <div>
              <label for="brand">Brand</label>
              <input id="brand" />
            </div>

            <div>
              <label for="budget_gbp">Budget (£)</label>
              <input id="budget_gbp" type="number" step="0.01" min="0" />
            </div>

            <div>
              <label for="size">Size</label>
              <input id="size" />
            </div>

            <div>
              <label for="colour">Colour</label>
              <input id="colour" />
            </div>

            <div>
              <label for="request_password">Request password</label>
              <input id="request_password" type="password" required />
            </div>
          </div>

          <div class="actions">
            <button type="submit">Submit Request</button>
            <button type="button" id="refreshRequestsBtn" class="secondary-btn">Refresh</button>
            <span id="requestStatus" class="status" role="status" aria-live="polite"></span>
          </div>
        </form>
      </article>

      <article class="panel">
        <div class="panel-header">
          <h2>Recent Requests</h2>
          <span class="panel-subtle">Latest customer submissions</span>
        </div>

        <div class="table-wrap">
          <table aria-label="Requests table">
            <caption>Recent customer shopping requests</caption>
            <thead>
              <tr>
                <th>Status</th>
                <th>Item</th>
                <th>Budget</th>
                <th>Updated</th>
                <th>View</th>
              </tr>
            </thead>
            <tbody id="requestsTableBody"></tbody>
          </table>
        </div>
      </article>
    </section>
  </main>

  <footer class="app-footer">
    <nav aria-label="Footer navigation">
      <a href="/app/index.html">Back to Dashboard</a>
    </nav>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
