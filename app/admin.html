<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SourceFlow — Admin</title>
  <link rel="stylesheet" href="./app.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">SourceFlow</div>
      <nav class="topnav" aria-label="Application navigation">
        <a href="/app/index.html">Dashboard</a>
        <a href="/app/requests.html">Requests</a>
        <a href="/app/admin.html" aria-current="page">Admin</a>
      </nav>
    </div>
  </header>

  <main class="app-shell" id="adminPage">
    <section class="hero-panel" aria-labelledby="admin-heading">
      <div>
        <p class="eyebrow">Concierge View</p>
        <h1 id="admin-heading">Admin Queue</h1>
        <p class="intro">
          Review requests, update statuses, and open request detail records.
        </p>
      </div>
    </section>

    <section class="panel" id="adminLoginCard" aria-labelledby="admin-login-heading">
      <div class="panel-header">
        <h2 id="admin-login-heading">Admin access</h2>
      </div>

      <form id="adminLoginForm" novalidate>
        <label for="adminPasswordInput">Password</label>
        <input id="adminPasswordInput" type="password" />

        <div class="actions">
          <button type="submit">Enter Admin</button>
          <span id="adminLoginStatus" class="status" role="status" aria-live="polite"></span>
        </div>
      </form>
    </section>

    <section class="panel" id="adminPanel" hidden aria-labelledby="admin-queue-heading">
      <div class="panel-header">
        <h2 id="admin-queue-heading">Request Queue</h2>
        <div class="panel-actions">
          <button type="button" id="refreshAdminBtn" class="secondary-btn">Refresh</button>
          <button type="button" id="logoutAdminBtn" class="secondary-btn">Log out</button>
        </div>
      </div>

      <div class="table-wrap">
        <table aria-label="Admin requests table">
          <caption>All customer requests — admin view</caption>
          <thead>
            <tr>
              <th>ID</th>
              <th>Customer</th>
              <th>Item</th>
              <th>Status</th>
              <th>Update</th>
              <th>Open</th>
            </tr>
          </thead>
          <tbody id="adminTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <nav aria-label="Footer navigation">
      <a href="/app/index.html">Back to Dashboard</a>
    </nav>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
